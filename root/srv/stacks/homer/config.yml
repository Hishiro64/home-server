---
# Homepage configuration
# See https://fontawesome.com/v5/search for icons options

title: "Dashboard"
subtitle: "Admin"
#logo: "assets/icons/pwa-192x192.png"
icon: "fas fa-sad-cry" # Optional icon
stylesheet:
  - "assets/custom.css"

# Other icon options
# "fa-solid fa-house-chimney"
# "fa-solid fa-server"
# "fa-solid fa-house-lock"
# "fa-solid fa-mug-hot"

header: true
#footer: false
footer: '<p><span class="has-text-danger">❗ Unauthorized access to this server is prohibited. Legal action will be taken. Disconnect now. ❗</span></p>' # Comment it out if you want to hide it.

theme: default
colors:
  light:
    highlight-primary: "#1b89a1"        
    highlight-secondary: "#34a6be"      
    highlight-hover: "#0f6f85"          
    background: "#e3eaef"               
    card-background: "#ffffff"
    text: "#1f2933"                     
    text-header: "#0f172a"
    text-title: "#1b3a4b"
    text-subtitle: "#64748b"
    card-shadow: rgba(0, 0, 0, 0.1)
    link: "#1b89a1"
    link-hover: "#0f6f85"
  dark:
    highlight-primary: "#1b89a1"        
    highlight-secondary: "#34a6be"      
    highlight-hover: "#4fd1ed"          
    background: "#121719"               
    card-background: "#1b89a11a"
    text: "#9bcafa"                     
    text-header: "#e2e8f0"
    text-title: "#95c3f3"
    text-subtitle: "#94a3b8"
    card-shadow: rgba(0, 0, 0, 0.4)
    link: "#34a6be"
    link-hover: "#ffffff"
    
message:
    style: "is-dark is-small"
    title: "Lofi Radio  (M to unmute)"
    icon: "fa-brands fa-youtube"
    content: '<iframe width="100%" height="250" align="center" src="https://www.youtube.com/embed/P6Segk8cr-c?controls=1&rel=0&autoplay=1&mute=1" title="lofi hip hop radio - beats to relax/study to" frameborder="0" allow="autoplay; encrypted-media; web-share" allowfullscreen></iframe>'
    
# Services
services:
  - name: "Docker"
    icon: "fa-brands fa-docker"
    items:
      - name: "Portainer 🐳"
        logo: "assets/resources/logos/portainer.svg"
        subtitle: "Manage docker containers"
        tag: "server"
        keywords: "portainer"
        url: "http://192.168.1.200:9999/#!/auth"
        #type: "Portainer"
        #apikey: "ptr_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx="
        environments:
         - "Server"
        target: "_blank"
      - name: "Doku 🔵️"
        icon: "fa-solid fa-hard-drive"
        #logo: "assets/resources/logos/doku.svg"
        subtitle: "Docker disk usage dashboard"
        tag: "storage"
        keywords: "doku"
        url: "http://192.168.1.200:10004"
        target: "_blank"
      - name: "Dozzle 📒"
        logo: "assets/resources/logos/dozzle.svg"
        subtitle: "View Docker logs live"
        tag: "server"
        keywords: "dozzle"
        url: "http://192.168.1.200:10002/"
        target: "_blank"
  - name: "Media"
    icon: "fas fa-video"
    items:
      - name: "Jellyfin 🎥"
        logo: "assets/resources/logos/jellyfin.svg"
        #subtitle: "Watch movies and shows"
        tag: "media"
        keywords: "jellyfin"
        url: "http://192.168.1.200:8096"
        type: "Emby"
        apikey: "<---insert-api-key-here--->"
        libraryType: "movies" #Choose which stats to show. Can be one of: music, series or movies.
        target: "_blank"
      - name: "Seerr 📝"
        logo: "assets/resources/logos/seerr.svg"
        subtitle: "Managing requests for your media library"
        tag: "media"
        keywords: "seerr"
        url: "http://192.168.1.200:8097/"
        target: "_blank"
      - name: "Stash 📦"
        logo: "assets/resources/logos/stash.png"
        subtitle: "Stash away your media"
        tag: "media"
        keywords: "stash"
        url: "http://192.168.1.200:10005/"
        target: "_blank"
      - name: "Immich 📸"
        logo: "assets/resources/logos/immich.svg"
        subtitle: "Photo and video management solution"
        tag: "media"
        keywords: "immich"
        url: "http://192.168.1.200:2283/"
