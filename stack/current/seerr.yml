---
services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=America/New_York
      - PORT=8097 #optional
    ports:
      - 8097:8097
    volumes:
       - /srv/stacks/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8097/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped